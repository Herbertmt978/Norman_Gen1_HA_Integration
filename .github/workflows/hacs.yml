name: HACS

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Validate with HACS
        uses: hacs/action@main
        with:
          category: integration
